<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給金サイコロ</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<a href="index.html" class="top-btn">🎲旅モード</a>

<div class="container">

  <h1>💰 給金サイコロ</h1>

  <div class="dice-card">

    <div class="scene">
  <div id="dice" class="cube money-cube">

    <div class="face one">¥500</div>
<div class="face two">¥500</div>
<div class="face three">¥1,000</div>
<div class="face four">¥1,000</div>
<div class="face five">¥1,500</div>
<div class="face six">¥2,000</div>

  </div>
</div>

    <button class="primary" onclick="rollDice()">サイコロを回す</button>
    <button class="primary" onclick="confirmMoney()">承認</button>

    <button class="secondary" onclick="resetTotal()">リセット</button>

  </div>

<h2>合計</h2>
<div id="total">0円</div>

<h3>使う</h3>
<input id="spendInput" type="number" placeholder="使用金額">
<input id="spendMemo" placeholder="支払い項目">
<button id="spendBtn" class="secondary" onclick="spendMoney()" disabled>
  使う
</button>

<h3>使用履歴</h3>
<div id="moneyHistory"></div>
</div>

<audio id="diceSound" src="dice.mp3"></audio>

<script src="money.js"></script>

</body>
</html>
